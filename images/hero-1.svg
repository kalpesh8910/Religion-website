<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="brbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="45%" style="stop-color:#fbcfe8"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
    <linearGradient id="brlot" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#db2777;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#f9a8d4;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="brshadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#831843" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="480" fill="url(#brbg)"/>
  <text x="600" y="36" text-anchor="middle" fill="#831843" font-family="Georgia,serif" font-size="26" font-weight="600" opacity="0.92">Brahma</text>
  <!-- Mantra panel: tall enough for both lines + padding; ends before any logo art -->
  <rect x="240" y="46" width="720" height="86" rx="12" fill="rgba(255,255,255,0.82)" stroke="#9d174d" stroke-width="1" stroke-opacity="0.3"/>
  <text x="600" y="92" text-anchor="middle" fill="#831843" font-family="Noto Sans Devanagari, Mangal, Nirmala UI, sans-serif" font-size="26" font-weight="600" filter="url(#brshadow)">ॐ ब्रह्मणे नमः</text>
  <text x="600" y="118" text-anchor="middle" fill="#9d174d" font-family="Georgia,serif" font-size="13" opacity="0.88">Om Brahmane Namah</text>
  <!-- Four faces — pushed down so top circle clears mantra block (ends ~y132) -->
  <g transform="translate(600,228)" fill="none" stroke="#9d174d" stroke-width="2.2" stroke-linecap="round" opacity="0.55">
    <circle cx="0" cy="-38" r="22"/>
    <circle cx="38" cy="0" r="22"/>
    <circle cx="0" cy="38" r="22"/>
    <circle cx="-38" cy="0" r="22"/>
  </g>
  <!-- Lotus — further down -->
  <g transform="translate(600,348)" fill="url(#brlot)" stroke="#9d174d" stroke-width="1.5" stroke-opacity="0.35">
    <ellipse cx="0" cy="20" rx="95" ry="28" opacity="0.5"/>
    <path d="M0,-40 C-55,-10 -55,35 0,50 C55,35 55,-10 0,-40"/>
    <path d="M0,-40 C-40,-25 -35,15 0,35 C35,15 40,-25 0,-40" fill="#fce7f3" fill-opacity="0.6"/>
    <path d="M-30,-15 L0,-55 L30,-15" fill="none" stroke="#be185d" stroke-width="2"/>
    <path d="M-45,5 L0,-45 L45,5" fill="none" stroke="#be185d" stroke-width="1.5" opacity="0.7"/>
  </g>
  <text x="600" y="448" text-anchor="middle" fill="#9d174d" font-family="Noto Sans Devanagari, Mangal, Nirmala UI, sans-serif" font-size="22" opacity="0.85">ब्रह्मा</text>
</svg>
