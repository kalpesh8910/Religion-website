<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Site profile and maintainer information.">
  <title>Profile — Religion &amp; Mantras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&family=Noto+Sans+Gujarati:wght@400;600&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a class="skip-link" href="#main" data-i18n="skip_link">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="index.html" data-i18n="logo">Religion &amp; Mantras</a>
      <div class="header-right-cluster">
        <div class="header-nav-wrap">
          <nav aria-label="Main" data-i18n-aria-label="nav_main">
            <ul>
              <li><a href="index.html" data-i18n="nav_home">Home</a></li>
              <li><a href="mantras.html" data-i18n="nav_mantras">Mantras</a></li>
              <li><a href="rishi-vansh.html" data-i18n="nav_rishi_vansh">Sage lineages</a></li>
              <li><a href="daily-karvanu.html" data-i18n="nav_daily_karvanu">Roj krvano vahivat (Nari)</a></li>
            </ul>
          </nav>
          <div class="mantro-wrap" id="mantro-wrap">
            <button type="button" class="mantro-btn" id="mantro-btn" aria-expanded="false" aria-haspopup="true" aria-controls="mantro-panel" data-i18n="mantro_btn" data-i18n-aria-label="mantro_btn_aria">Mantro</button>
            <div class="mantro-panel" id="mantro-panel" role="menu">
              <ul class="mantro-list" id="mantro-list" role="none"></ul>
            </div>
          </div>
          <a href="dharm-knowledge.html" class="mantro-btn" data-i18n="nav_dharm_knowledge">Dharm Knowledge</a>
          <div class="lang-switcher">
            <label for="site-lang" data-i18n="site_lang_label">Site language</label>
            <select id="site-lang" aria-label="Site language">
              <option value="en" data-i18n-label="opt_lang_en">English</option>
              <option value="gu" data-i18n-label="opt_lang_gu">ગુજરાતી</option>
            </select>
          </div>
        </div>
        <a class="header-profile" href="profile.html" data-i18n-aria-label="nav_profile_aria">
          <svg class="header-profile-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="header-profile-label" data-i18n="nav_profile">Profile</span>
        </a>
      </div>
    </div>
  </header>
  <main id="main">
    <div class="profile-layout">
      <article class="card">
        <h1 class="section-title profile-title" data-i18n="profile_h1">Profile</h1>
        <p class="religion-desc" data-i18n="profile_intro"></p>
        <p class="religion-desc profile-note" data-i18n-html="profile_note"></p>

        <form id="profile-form" class="profile-form" novalidate>
          <div class="profile-photo-block">
            <p class="profile-field-label" data-i18n="profile_photo_label">Profile photo</p>
            <div class="profile-photo-wrap">
              <img id="profile-photo-preview" class="profile-photo-preview" alt="" width="160" height="160" hidden>
              <div id="profile-photo-placeholder" class="profile-photo-placeholder" aria-hidden="true">ॐ</div>
            </div>
            <p class="profile-photo-hint" id="profile-photo-hint" data-i18n="profile_photo_hint"></p>
            <input type="file" id="profile-file" class="profile-file-input" accept="image/jpeg,image/png,image/webp,image/gif">
            <div class="profile-photo-actions">
              <button type="button" class="mantro-btn" id="profile-upload-btn" data-i18n="profile_photo_upload">Upload image</button>
              <button type="button" class="profile-btn-remove" id="profile-remove-photo" data-i18n="profile_photo_remove" disabled>Remove photo</button>
            </div>
          </div>

          <div class="profile-field">
            <label for="profile-name"><span data-i18n="profile_field_name">Full name</span> <span class="profile-req" data-i18n="profile_required_suffix">(required)</span></label>
            <input type="text" id="profile-name" name="fullName" required autocomplete="name" data-i18n-placeholder="profile_ph_name">
          </div>
          <div class="profile-field">
            <label for="profile-email"><span data-i18n="profile_field_email">Email</span> <span class="profile-req" data-i18n="profile_required_suffix">(required)</span></label>
            <input type="email" id="profile-email" name="email" required autocomplete="email" data-i18n-placeholder="profile_ph_email">
          </div>
          <div class="profile-field">
            <label for="profile-phone"><span data-i18n="profile_field_phone">Phone</span> <span class="profile-opt" data-i18n="profile_optional_suffix">(optional)</span></label>
            <input type="tel" id="profile-phone" name="phone" autocomplete="tel" data-i18n-placeholder="profile_ph_phone">
          </div>
          <div class="profile-field">
            <label for="profile-city"><span data-i18n="profile_field_city">City / location</span> <span class="profile-opt" data-i18n="profile_optional_suffix">(optional)</span></label>
            <input type="text" id="profile-city" name="city" autocomplete="address-level2" data-i18n-placeholder="profile_ph_city">
          </div>
          <div class="profile-field">
            <label for="profile-religion"><span data-i18n="profile_field_religion">Religion / tradition</span> <span class="profile-opt" data-i18n="profile_optional_suffix">(optional)</span></label>
            <input type="text" id="profile-religion" name="religion" data-i18n-placeholder="profile_ph_religion">
          </div>
          <div class="profile-field">
            <label for="profile-bio"><span data-i18n="profile_field_bio">About you</span> <span class="profile-req" data-i18n="profile_required_suffix">(required)</span></label>
            <textarea id="profile-bio" name="bio" rows="4" required data-i18n-placeholder="profile_ph_bio"></textarea>
          </div>

          <p id="profile-message" class="profile-message" role="status" aria-live="polite"></p>

          <div class="profile-form-actions">
            <button type="submit" class="profile-btn-save" data-i18n="profile_save">Save profile</button>
          </div>
        </form>

        <p class="religion-desc profile-footer-links"><a href="index.html" data-i18n="nav_home">Home</a> · <a href="mantras.html" data-i18n="nav_mantras">Mantras</a></p>
      </article>
    </div>
  </main>
  <footer class="site-footer">
    <p data-i18n="footer_public">Public reference site — content is provided for education and devotion.</p>
  </footer>
  <script src="js/i18n.js"></script>
  <script src="js/site-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/profile-page.js"></script>
</body>
</html>
